{% extends 'accounts/base.html' %}

{% block content %}

<div class="container-fluid">


    <div class="d-flex justify-content-between align-items-center mb-4">

        <div>

            <h1 class="mb-1">Novo Colaborador</h1>

            <p class="text-muted mb-0">
                Cadastro de usuários e profissionais da clínica.
            </p>

        </div>

        <a href="{% url 'usuarios' %}" class="btn btn-outline-secondary">

            <i class="fa-solid fa-arrow-left"></i>

            Voltar

        </a>

    </div>

    <form method="POST" enctype="multipart/form-data">

        {% csrf_token %}

        <!-- DADOS PESSOAIS -->

        <div class="card shadow-sm border-0 mb-4">

            <div class="card-header bg-white">

                <h5 class="mb-0">

                    <i class="fa-solid fa-user me-2"></i>

                    Dados Pessoais

                </h5>

            </div>

            <div class="card-body">

                <div class="row align-items-center">

                    <div class="col-md-2 text-center">

                        <img id="preview-foto" src="https://via.placeholder.com/140x140?text=Foto"
                            class="rounded-circle border shadow-sm" style="
                            width:120px;
                            height:120px;
                            object-fit:cover;
                        ">

                        <div class="mt-3">

                            <label class="btn btn-outline-primary btn-sm">

                                <i class="fa-solid fa-camera"></i>

                                Foto

                                <input type="file" name="foto" id="foto" accept="image/*" hidden>

                            </label>

                        </div>

                    </div>

                    <div class="col-md-10">

                        <div class="row">

                            <div class="col-md-6 mb-3">

                                <label class="form-label">
                                    Nome Completo
                                </label>

                                <input type="text" name="nome" class="form-control" value="{{ usuario_obj.first_name }}"
                                    required>

                            </div>

                            <div class="col-md-3 mb-3">

                                <label class="form-label">
                                    CPF
                                </label>

                                <input type="text" id="cpf" name="cpf" class="form-control" maxlength="14"
                                    value="{{ perfil.cpf|default:'' }}">
                            </div>

                            <div id="cpf-erro" class="text-danger small mt-1" style="display:none;">
                                CPF inválido.
                            </div>

                            <div class="col-md-3 mb-3">

                                <label class="form-label">
                                    RG
                                </label>

                                <input type="text" name="rg" class="form-control" value="{{ perfil.rg|default:'' }}">

                            </div>

                            <div class="col-md-3 mb-3">

                                <label class="form-label">
                                    Data Nascimento
                                </label>

                                <input type="date" name="data_nascimento" class="form-control"
                                    value="{% if perfil.data_nascimento %}{{ perfil.data_nascimento|date:'Y-m-d' }}{% endif %}">

                            </div>

                            <div class="col-md-3 mb-3">

                                <label class="form-label">
                                    Sexo
                                </label>

                                <select name="sexo" class="form-select">

                                    <option value="">
                                        Selecione
                                    </option>

                                    <option value="M">
                                        Cis Masculino
                                    </option>

                                    <option value="F">
                                        Cis Feminino
                                    </option>

                                    <option value="T">
                                        Transgênero
                                    </option>

                                    <option value="O">
                                        Outros
                                    </option>

                                </select>

                            </div>

                        </div>

                    </div>

                </div>

            </div>

        </div>

        <!-- CONTATO -->

        <div class="card shadow-sm border-0 mb-4">

            <div class="card-header bg-white">

                <h5 class="mb-0">

                    <i class="fa-solid fa-location-dot me-2"></i>

                    Contato e Endereço

                </h5>

            </div>

            <div class="card-body">

                <div class="row">

                    <div class="col-md-2 mb-3">

                        <label class="form-label">
                            CEP
                        </label>

                        <input type="text" id="cep" name="cep" class="form-control" value="{{ perfil.cep|default:'' }}">

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Endereço
                        </label>

                        <input type="text" id="logradouro" name="logradouro" class="form-control"
                            value="{{ perfil.logradouro|default:'' }}">

                    </div>

                    <div class="col-md-2 mb-3">

                        <label class="form-label">
                            Número
                        </label>

                        <input type="text" name="numero" class="form-control" value="{{ perfil.numero|default:'' }}">

                    </div>

                    <div class="col-md-2 mb-3">

                        <label class="form-label">
                            Complemento
                        </label>

                        <input type="text" name="complemento" class="form-control"
                            value="{{ perfil.complemento|default:'' }}">

                    </div>

                    <div class="col-md-4 mb-3">

                        <label class="form-label">
                            Bairro
                        </label>

                        <input type="text" id="bairro" name="bairro" class="form-control"
                            value="{{ perfil.bairro|default:'' }}">

                    </div>

                    <div class="col-md-4 mb-3">

                        <label class="form-label">
                            Cidade
                        </label>

                        <input type="text" id="cidade" name="cidade" class="form-control"
                            value="{{ perfil.cidade|default:'' }}">

                    </div>

                    <div class="col-md-2 mb-3">

                        <label class="form-label">
                            Estado
                        </label>

                        <input type="text" id="uf" name="uf" class="form-control" value="{{ perfil.uf|default:'' }}">

                    </div>

                    <div class="col-md-3 mb-3">

                        <label class="form-label">
                            Telefone
                        </label>

                        <input type="text" id="telefone" name="telefone" class="form-control"
                            value="{{ perfil.telefone|default:'' }}">

                    </div>

                    <div class="col-md-3 mb-3">

                        <label class="form-label">
                            Celular
                        </label>

                        <input type="text" id="celular" name="celular" class="form-control"
                            value="{{ perfil.celular|default:'' }}">

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            E-mail
                        </label>

                        <input type="email" name="email" class="form-control"
                            value="{{ usuario_obj.email|default:'' }}">

                    </div>

                </div>

            </div>

        </div>

        <!-- DADOS PROFISSIONAIS -->

        <div class="card shadow-sm border-0 mb-4">

            <div class="card-header bg-white">

                <h5 class="mb-0">

                    <i class="fa-solid fa-briefcase me-2"></i>

                    Dados Profissionais

                </h5>

            </div>

            <div class="row">

                <div class="col-md-4 mb-3">

                    <label class="form-label">
                        Perfil
                    </label>

                    <select id="tipo_usuario" name="tipo_usuario" class="form-select" required>

                        <option value="admin">Administrador</option>
                        <option value="gestor">Gestor</option>
                        <option value="dentista">Dentista</option>
                        <option value="secretaria">Secretária</option>
                        <option value="acd">ACD</option>
                        <option value="contabilidade">Contabilidade</option>
                        <option value="marketing">Marketing</option>
                        <option value="auditoria">Auditoria</option>

                    </select>

                </div>

            </div>

            <div id="dados-dentista">

                <div class="row">

                    <div class="col-md-2 mb-3">

                        <label class="form-label">
                            CRO
                        </label>

                        <input type="text" name="cro" class="form-control">

                    </div>

                    <div class="col-md-2 mb-3">

                        <label class="form-label">
                            UF CRO
                        </label>

                        <input type="text" name="cro_uf" class="form-control">

                    </div>

                    <div class="col-md-4 mb-3">

                        <label class="form-label">
                            Especialidade
                        </label>

                        <input type="text" name="especialidade" class="form-control">

                    </div>

                    <div class="col-md-4 mb-3">

                        <label class="form-label">
                            Assinatura Digital
                        </label>

                        <input type="file" name="assinatura" class="form-control" accept="image/png,image/jpeg">

                    </div>

                </div>

            </div>

            <!-- ACESSO -->

            <div class="card shadow-sm border-0 mb-4">

                <div class="card-header bg-white">

                    <h5 class="mb-0">

                        <i class="fa-solid fa-key me-2"></i>

                        Acesso ao Sistema

                    </h5>

                </div>

                <div class="card-body">

                    <div class="row">

                        <div class="col-md-4 mb-3">

                            <label class="form-label">
                                Login
                            </label>

                            <input type="text" name="username" class="form-control" required>

                        </div>

                        <div class="col-md-4 mb-3">

                            <label class="form-label">
                                Senha
                            </label>

                            <input type="password" id="senha" name="senha" class="form-control" required>

                        </div>

                        <div class="col-md-4 mb-3">

                            <label class="form-label">
                                Confirmar Senha
                            </label>

                            <input type="password" id="confirmar_senha" name="confirmar_senha" class="form-control"
                                required>

                        </div>

                    </div>

                </div>

            </div>

            <div class="text-end mb-5">

                <button type="submit" class="btn btn-primary btn-lg">

                    <i class="fa-solid fa-floppy-disk"></i>

                    Salvar Colaborador

                </button>

            </div>

    </form>


</div>

<script>

    document.getElementById('foto').addEventListener('change', function () {

        const arquivo = this.files[0];

        if (!arquivo) {
            return;
        }

        const reader = new FileReader();

        reader.onload = function (e) {

            document.getElementById('preview-foto').src =
                e.target.result;

        }

        reader.readAsDataURL(arquivo);

    });

    document.getElementById('cep').addEventListener('blur', function () {

        let cep = this.value.replace(/\D/g, '');

        if (cep.length !== 8) {
            return;
        }

        fetch(`https://viacep.com.br/ws/${cep}/json/`)
            .then(response => response.json())
            .then(data => {

                document.getElementById('logradouro').value =
                    data.logradouro || '';

                document.getElementById('bairro').value =
                    data.bairro || '';

                document.getElementById('cidade').value =
                    data.localidade || '';

                document.getElementById('uf').value =
                    data.uf || '';

            });

    });

    const cpf = document.getElementById('cpf');

    cpf.addEventListener('input', function () {

        let valor = this.value.replace(/\D/g, '');

        valor = valor.substring(0, 11);

        valor = valor.replace(/(\d{3})(\d)/, '$1.$2');
        valor = valor.replace(/(\d{3})(\d)/, '$1.$2');
        valor = valor.replace(/(\d{3})(\d{1,2})$/, '$1-$2');

        this.value = valor;

    });

    const telefone = document.getElementById('telefone');

    telefone.addEventListener('input', function () {

        let valor = this.value.replace(/\D/g, '');

        // Limita a 10 dígitos
        valor = valor.substring(0, 10);

        valor = valor.replace(
            /^(\d{2})(\d{4})(\d{0,4}).*/,
            '($1) $2-$3'
        );

        this.value = valor;

    });

    const celular = document.getElementById('celular');

    celular.addEventListener('input', function () {

        let valor = this.value.replace(/\D/g, '');

        // Limita a 11 dígitos
        valor = valor.substring(0, 11);

        if (valor.length > 10) {

            valor = valor.replace(
                /^(\d{2})(\d{5})(\d{4}).*/,
                '($1) $2-$3'
            );

        } else {

            valor = valor.replace(
                /^(\d{2})(\d{4})(\d{0,4}).*/,
                '($1) $2-$3'
            );

        }

        this.value = valor;

    });

    const cepCampo = document.getElementById('cep');

    cepCampo.addEventListener('input', function () {

        let valor = this.value.replace(/\D/g, '');

        valor = valor.replace(/^(\d{5})(\d)/, '$1-$2');

        this.value = valor;

    });

    function validarCPF(cpf) {

        cpf = cpf.replace(/\D/g, '');

        if (cpf.length !== 11) {
            return false;
        }

        if (/^(\d)\1+$/.test(cpf)) {
            return false;
        }

        let soma = 0;

        for (let i = 0; i < 9; i++) {

            soma += parseInt(cpf.charAt(i)) * (10 - i);

        }

        let resto = (soma * 10) % 11;

        if (resto === 10) {
            resto = 0;
        }

        if (resto !== parseInt(cpf.charAt(9))) {
            return false;
        }

        soma = 0;

        for (let i = 0; i < 10; i++) {

            soma += parseInt(cpf.charAt(i)) * (11 - i);

        }

        resto = (soma * 10) % 11;

        if (resto === 10) {
            resto = 0;
        }

        return resto === parseInt(cpf.charAt(10));

    }

    cpf.addEventListener('blur', function () {

        const erro = document.getElementById('cpf-erro');

        if (this.value.trim() === '') {

            erro.style.display = 'none';
            return;

        }

        if (validarCPF(this.value)) {

            erro.style.display = 'none';

            this.classList.remove('is-invalid');
            this.classList.add('is-valid');

        } else {

            erro.style.display = 'block';

            this.classList.remove('is-valid');
            this.classList.add('is-invalid');

        }

    });

    // =========================================
    // MOSTRAR CAMPOS DE DENTISTA
    // =========================================

    document.addEventListener('DOMContentLoaded', function () {

        const perfil = document.getElementById('tipo_usuario');
        const dadosDentista = document.getElementById('dados-dentista');

        function atualizarPerfil() {

            if (
                perfil.value === 'dentista' ||
                perfil.value === 'acd'
            ) {

                dadosDentista.style.display = 'block';

            } else {

                dadosDentista.style.display = 'none';

            }

        }

        perfil.addEventListener('change', atualizarPerfil);

        atualizarPerfil();

    });


    // =========================================
    // CONFIRMAR SENHA
    // =========================================

    const senha = document.getElementById('senha');
    const confirmarSenha = document.getElementById('confirmar_senha');

    if (senha && confirmarSenha) {

        confirmarSenha.addEventListener('blur', function () {

            if (this.value === '') {
                return;
            }

            if (senha.value === this.value) {

                this.classList.remove('is-invalid');
                this.classList.add('is-valid');

            } else {

                this.classList.remove('is-valid');
                this.classList.add('is-invalid');

                alert('As senhas não coincidem.');

            }

        });

    }

</script>

{% endblock %}
