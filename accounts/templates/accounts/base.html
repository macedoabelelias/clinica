{% load static %}

<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>AM Systems</title>

    <!-- =========================================
    BOOTSTRAP
    ========================================== -->

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <!-- =========================================
    BOOTSTRAP ICONS
    ========================================== -->

    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    >

    <!-- =========================================
    FONT AWESOME
    ========================================== -->

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    >

    <!-- =========================================
    CSS GLOBAL
    ========================================== -->

    <link
        rel="stylesheet"
        href="{% static 'css/style.css' %}"
    >

    <!-- =========================================
CSS DASHBOARD
========================================= -->

<link
    rel="stylesheet"
    href="{% static 'css/dashboard.css' %}"
>

    <!-- =========================================
    CSS PACIENTES
    ========================================== -->

    <link
        rel="stylesheet"
        href="{% static 'css/pacientes.css' %}"
    >

    <!-- =========================================
    CSS ODONTOGRAMA
    ========================================== -->

    <link
        rel="stylesheet"
        href="{% static 'css/odontograma.css' %}"
    >

    <!-- =========================================
    CSS ANAMNESE
    ========================================== -->

    <link
        rel="stylesheet"
        href="{% static 'css/anamnese.css' %}"
    >

    <!-- =========================================
    CSS FICHA CLÍNICA
    ========================================== -->
<link
    rel="stylesheet"
    href="{% static 'css/ficha_clinica.css' %}"
>

{% block extra_css %}
{% endblock %}

</head>
<body>

<div class="dashboard-wrapper">

    <!-- =========================================
    SIDEBAR
    ========================================== -->

    <aside class="sidebar">

        <!-- LOGO -->

        <div class="logo-area">

            <img
                src="{% static 'img/logo.png' %}"
                alt="Logo"
            >

        </div>

        <!-- MENU -->

    <ul class="sidebar-menu">

    <!-- DASHBOARD -->

    <li class="{% if 'dashboard' in request.path %}active{% endif %}">

        <a href="/dashboard/">

            <i class="fa-solid fa-chart-line"></i>

            <span>Dashboard</span>

        </a>

    </li>

    <!-- PACIENTES -->

    <li class="{% if 'pacientes' in request.path and 'odontograma' not in request.path %}active{% endif %}">

        <a href="/pacientes/">

            <i class="fa-solid fa-users"></i>

            <span>Pacientes</span>

        </a>

    </li>

    <!-- PROCEDIMENTOS -->

    <li class="{% if 'procedimentos' in request.path %}active{% endif %}">

        <a href="/procedimentos/">

            <i class="fa-solid fa-tooth"></i>

            <span>Procedimentos</span>

        </a>

    </li>

    <!-- AGENDA -->

    <li class="{% if 'agenda' in request.path %}active{% endif %}">

        <a href="/agenda/">

            <i class="fa-solid fa-calendar"></i>

            <span>Agenda</span>

        </a>

    </li>

    <!-- FINANCEIRO -->

    <li class="{% if 'financeiro' in request.path %}active{% endif %}">

        <a href="/financeiro/">

            <i class="fa-solid fa-wallet"></i>

            <span>Financeiro</span>

        </a>

    </li>

  <!-- NOVO MENU -->
    <li class="nav-item">

    <a class="nav-link" href="{% url 'convenios' %}">

        <i class="fa-solid fa-hospital-user me-2"></i>

        <span>Convênios</span>

    </a>

</li>

</ul>    
    </aside>

    <!-- =========================================
    MAIN CONTENT
    ========================================== -->

    <main class="main-content">

        {% block content %}
        {% endblock %}

    </main>

</div>

<!-- Bootstrap JS -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
