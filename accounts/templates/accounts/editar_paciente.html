{% load static %}

<!DOCTYPE html>

<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>

        Editar Paciente | AM Systems

    </title>

    <!-- Bootstrap -->

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <!-- Icons -->

    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Fonte -->

    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- CSS -->

    <link
        rel="stylesheet"
        href="{% static 'css/pacientes.css' %}">

</head>

<body>

<div class="container py-4">

    <!-- HEADER -->

    <div class="d-flex justify-content-between align-items-center mb-4">

        <div>

            <h2 class="fw-bold mb-1">

                Editar Paciente

            </h2>

            <p class="text-muted mb-0">

                Atualize os dados do paciente.

            </p>

        </div>

        <a
        href="{% url 'pacientes' %}"
        class="btn btn-light rounded-pill px-4"
    >

        <i class="bi bi-arrow-left"></i>

        Voltar

    </a>

    </div>

    <!-- FORM -->

    <div class="card border-0 shadow-sm rounded-4">

        <div class="card-body p-4">

            <form
    method="POST"
    enctype="multipart/form-data">

    {% csrf_token %}

 <div class="modal-body premium-form-body">

    <!-- =========================================
    FOTO
    ========================================== -->

    <div class="photo-upload-area">

        <label class="upload-photo">

            <input
                type="file"
                name="foto"
                hidden
            >

            <div class="photo-circle">

                <img
                    id="previewFoto"
                    src=""
                    style="display:none;"
                >

                <i
                    class="bi bi-camera-fill"
                    id="cameraIcon"></i>

            </div>

            <span>

                Adicionar foto

            </span>

        </label>

    </div>

    <!-- =========================================
    DADOS PESSOAIS
    ========================================== -->

    <div class="form-section">

        <div class="section-header">

            <i class="bi bi-person-vcard-fill"></i>

            <h5>

                Dados Pessoais

            </h5>

        </div>

        <div class="row g-3">

            <!-- NOME -->

            <div class="col-md-12">

    <label class="form-label">

        Nome completo

    </label>

    <input
        type="text"
        name="nome"
        class="form-control premium-input"
        value="{{ paciente.nome }}"
        required
    >

</div>

            <!-- CPF -->

            <div class="col-md-4">

                <label class="form-label">

                    CPF

                </label>

                <input
                    type="text"
                    name="cpf"
                    id="cpf"
                    class="form-control premium-input"
                    value="{{ paciente.cpf }}"
                >

            </div>

           <!-- NASCIMENTO -->

<div class="col-md-3">

    <label class="form-label">

        Data nascimento

    </label>

    <input
        type="date"
        name="nascimento"
        class="form-control premium-input"
        value="{{ paciente.nascimento }}"
    >

</div>

<!-- IDADE -->

<div class="col-md-2">

    <label class="form-label">

        Idade

    </label>

    <input
        type="text"
        id="idade"
        class="form-control premium-input"
        value="{{ paciente.idade }}"
        readonly
    >

</div>      

            <!-- GÊNERO -->

            <div class="col-md-3">

                <label class="form-label">

                    Gênero

                </label>

                <select
                    name="genero"
                    class="form-select premium-input">

                    <option value="">

                        Selecione

                    </option>

                    <option>

                        Cis Masculino

                    </option>

                    <option>

                        Cis Feminino

                    </option>

                    <option>

                        Transgênero

                    </option>

                    <option>

                        Não-binário

                    </option>

                    <option>

                        Outros

                    </option>


                </select>

            </div>

            <!-- PROFISSÃO -->

            <div class="col-md-6">

                <label class="form-label">

                    Profissão

                </label>

                <input
                    type="text"
                    name="profissao"
                    class="form-control premium-input"
                    value="{{ paciente.profissao }}"    
                >

            </div>

            <!-- ESTADO CIVIL -->

            <div class="col-md-6">

                <label class="form-label">

                    Estado Civil

                </label>

                <select
                    name="estado_civil"
                    class="form-select premium-input">

                    <option value="">

                        Selecione

                    </option>

                    <option>

                        Solteiro(a)

                    </option>

                    <option>

                        Casado(a)

                    </option>

                    <option>

                        Divorciado(a)

                    </option>

                    <option>

                        Viúvo(a)

                    </option>

                    <option>

                        Outros

                    </option>

                </select>

            </div>

        </div>

    </div>

    <!-- =========================================
    CONTATO
    ========================================== -->

    <div class="form-section">

        <div class="section-header">

            <i class="bi bi-telephone-fill"></i>

            <h5>

                Contato

            </h5>

        </div>

        <div class="row g-3">

            <div class="col-md-3">

                <label class="form-label">

                    Telefone

                </label>

                <input
                    type="text"
                    name="telefone"
                    id="telefone"
                    class="form-control premium-input"
                    value="{{ paciente.telefone }}"
                >

            </div>

            <div class="col-md-3">

                <label class="form-label">

                    WhatsApp

                </label>

                <input
                    type="text"
                    name="whatsapp"
                    id="whatsapp"
                    class="form-control premium-input"
                    value="{{ paciente.whatsapp }}"
                >

            </div>

            <div class="col-md-6">

                <label class="form-label">

                    Email

                </label>

                <input
                    type="email"
                    name="email"
                    class="form-control premium-input"
                    value="{{ paciente.email }}"    
                >

            </div>

        </div>

    </div>

    <!-- =========================================
    ENDEREÇO
    ========================================== -->

    <div class="form-section">

        <div class="section-header">

            <i class="bi bi-geo-alt-fill"></i>

            <h5>

                Endereço

            </h5>

        </div>

        <div class="row g-3">

            <div class="col-md-2">

                <label class="form-label">

                    CEP

                </label>

                <input
                    type="text"
                    name="cep"
                    id="cep"
                    class="form-control premium-input"
                    value="{{ paciente.cep }}"

                >

            </div>

            <div class="col-md-6">

                <label class="form-label">

                    Endereço

                </label>

                <input
                    type="text"
                    name="endereco"
                    id="endereco"
                    class="form-control premium-input"
                    value="{{ paciente.endereco }}" 
                >

            </div>

            <div class="col-md-2">

                <label class="form-label">

                    Número

                </label>

                <input
                    type="text"
                    name="numero"
                    class="form-control premium-input"
                    value="{{ paciente.numero }}"
                >

            </div>

            <div class="col-md-2">

                <label class="form-label">

                    Complemento

                </label>

                <input
                    type="text"
                    name="complemento"
                    class="form-control premium-input"
                    value="{{ paciente.complemento }}"  
                >

            </div>


            <div class="col-md-4">

                <label class="form-label">

                    Bairro

                </label>

                <input
                    type="text"
                    name="bairro"
                    id="bairro"
                    class="form-control premium-input"
                    value="{{ paciente.bairro }}"
                >

            </div>

            <div class="col-md-4">

                <label class="form-label">

                    Cidade

                </label>

                <input
                    type="text"
                    name="cidade"
                    id="cidade"
                    class="form-control premium-input"
                    value="{{ paciente.cidade }}"   
                >

            </div>

            <div class="col-md-4">

                <label class="form-label">

                    Estado

                </label>

                <input
                    type="text"
                    name="estado"
                    id="estado"
                    class="form-control premium-input"
                    value="{{ paciente.estado }}"
                >

            </div>

        </div>

    </div>

    <!-- =========================================
    RESPONSÁVEL
    ========================================== -->

    <div
        class="form-section responsavel-section"
        style="display:none;">

        <div class="section-header">

            <i class="bi bi-person-heart"></i>

            <h5>

                Responsável Legal

            </h5>

        </div>

        <div class="row g-3">

            <div class="col-md-4">

                <label class="form-label">

                    Nome responsável

                </label>

                <input
                    type="text"
                    name="responsavel"
                    class="form-control premium-input"
                    value="{{ paciente.responsavel }}"
                >

            </div>

            <div class="col-md-4">

                <label class="form-label">

                    CPF responsável

                </label>

                <input
                    type="text"
                    name="cpf_responsavel"
                    id="cpf_responsavel"
                    class="form-control premium-input"
                    value="{{ paciente.cpf_responsavel }}"
                >

            </div>

            <div class="col-md-4">

                <label class="form-label">

                    Telefone responsável

                </label>

                <input
                    type="text"
                    name="telefone_responsavel"
                    id="telefone_responsavel"
                    class="form-control premium-input"
                    value="{{ paciente.telefone_responsavel }}"

                >

            </div>

        </div>

    </div>

    <!-- =========================================
    DADOS CLÍNICOS
    ========================================== -->

    <div class="form-section">

        <div class="section-header">

            <i class="bi bi-heart-pulse-fill"></i>

            <h5>

                Dados Clínicos

            </h5>

        </div>

        <div class="row g-3">

            <div class="col-md-6">

                <label class="form-label">

                    Convênio

                </label>

                <input
                    type="text"
                    name="convenio"
                    class="form-control premium-input"
                    value="{{ paciente.convenio }}" 
                >

            </div>

            <div class="col-md-6">

                <label class="form-label">

                    Carteirinha

                </label>

                <input
                    type="text"
                    name="carteirinha"
                    class="form-control premium-input"
                    value="{{ paciente.carteirinha }}"

                >

            </div>

            <div class="col-md-6">

                <label class="form-label">

                    Alergias

                </label>

                <textarea
                    name="alergias"
                    rows="3"
                    class="form-control premium-input"
                    value="{{ paciente.alergias }}"></textarea>

            </div>

            <div class="col-md-6">

                <label class="form-label">

                    Medicamentos contínuos

                </label>

                <textarea
                    name="medicamentos"
                    rows="3"
                    class="form-control premium-input"
                    value="{{ paciente.medicamentos }}"></textarea>

            </div>

            <div class="col-md-12">

                <label class="form-label">

                    Observações clínicas

                </label>

                <textarea
                    name="observacoes"
                    rows="4"
                    class="form-control premium-input"
                    value="{{ paciente.observacoes }}"></textarea>  

            </div>

        </div>

    </div>

</div>

    <!-- FOOTER -->

    <div class="modal-footer border-0 p-4">

        <button
            type="button"
            class="btn btn-light rounded-4 px-4"
            data-bs-dismiss="modal">

            Cancelar

        </button>

        <button
            type="submit"
            class="btn btn-primary rounded-4 px-4">

            Salvar Paciente

        </button>

    </div>

</form>

        </div>

    </div>

</div>

<!-- JS -->

<script src="{% static 'js/pacientes.js' %}"></script>

</body>

</html>
