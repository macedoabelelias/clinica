{% extends 'accounts/base.html' %}

{% block content %}

<div class="container-fluid">


<div class="d-flex justify-content-between align-items-center mb-4">

    <h3>

        {% if receita %}

            Editar Receita

        {% else %}

            Nova Receita

        {% endif %}

    </h3>

</div>

<form method="post">

    {% csrf_token %}

    <!-- MEDICAMENTO -->

    <div class="mb-3">

        <label class="form-label">

            Medicamento

        </label>

        <select
            name="medicamento"
            class="form-select"
            required
        >

            <option value="">

                Selecione um medicamento

            </option>

            {% for medicamento in medicamentos %}

            <option
                value="{{ medicamento.id }}"
                {% if receita and receita.medicamento.id == medicamento.id %}selected{% endif %}
            >

                {{ medicamento.nome }}
                {{ medicamento.concentracao }}

            </option>

            {% endfor %}

        </select>

    </div>

    <!-- TIPO DE RECEITA -->

    <div class="mb-3">

        <label class="form-label">

            Tipo de Receita

        </label>

        <select
            name="tipo_receita"
            class="form-select"
        >

            <option
                value="simples"
                {% if receita and receita.tipo_receita == 'simples' %}selected{% endif %}
            >
                Receituário Simples
            </option>

            <option
                value="controle"
                {% if receita and receita.tipo_receita == 'controle' %}selected{% endif %}
            >
                Receita de Controle Especial
            </option>

        </select>

    </div>

    <!-- QUANTIDADE -->

    <div class="mb-3">

        <label class="form-label">

            Quantidade

        </label>

        <input
            type="text"
            name="quantidade"
            class="form-control"
            placeholder="Ex.: 1 caixa"
            value="{{ receita.quantidade|default:'' }}"
            required
        >

    </div>

    <!-- POSOLOGIA -->

    <div class="mb-3">

        <label class="form-label">

            Posologia

        </label>

        <textarea
            name="posologia"
            rows="4"
            class="form-control"
            required
        >{{ receita.posologia|default:'' }}</textarea>

    </div>

    <!-- OBSERVAÇÕES -->

    <div class="mb-3">

        <label class="form-label">

            Observações

        </label>

        <textarea
            name="observacoes"
            rows="3"
            class="form-control"
        >{{ receita.observacoes|default:'' }}</textarea>

    </div>

    <!-- BOTÕES -->

    <div class="d-flex gap-2">

        <button
            type="submit"
            class="btn btn-primary"
        >

            <i class="bi bi-check-circle"></i>

            Salvar Receita

        </button>

        <a
            href="{% url 'receitas' paciente.id %}"
            class="btn btn-secondary"
        >

            Cancelar

        </a>

    </div>

</form>

</div>

{% endblock %}
