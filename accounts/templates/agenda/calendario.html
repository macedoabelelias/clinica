{% extends 'accounts/base.html' %}

{% block content %}

<div class="container-fluid">

    <div class="d-flex justify-content-between align-items-center mb-4">

        <h1>Agenda</h1>

        <a href="{% url 'novo_agendamento' %}" class="btn btn-primary">
            Novo Agendamento
        </a>

    </div>

    <div id="calendar" style="
            background:white;
            padding:20px;
            border-radius:20px;
        "></div>

</div>

<!-- MODAL DO AGENDAMENTO -->

<div class="modal fade" id="eventoModal" tabindex="-1">

    <div class="modal-dialog">

        <div class="modal-content">

            <div class="modal-header">

                <h5 class="modal-title" id="modalPaciente">
                </h5>

                <button type="button" class="btn-close" data-bs-dismiss="modal">
                </button>

            </div>

            <div class="modal-body">

                <div class="mb-3">

                    <span id="modalStatus" class="badge bg-primary fs-6">
                    </span>

                </div>

                <div class="mb-3">

                    <strong>Procedimento</strong>

                    <div id="modalProcedimento" class="text-muted">
                    </div>

                </div>

                <div class="mb-3">

                    <strong>Profissional</strong>

                    <div id="modalProfissional" class="text-muted">
                    </div>

                </div>

            </div>

            <div class="modal-footer justify-content-between">

                <div>

                    <a id="btnPerfil" class="btn btn-outline-primary">
                        <i class="bi bi-person"></i>
                        Perfil
                    </a>

                </div>

                <div class="d-flex gap-2">

                    <a id="btnEditar" class="btn btn-primary">
                        <i class="bi bi-pencil-square"></i>
                        Editar
                    </a>

                    <a id="btnAtendimento" class="btn btn-success">
                        <i class="bi bi-play-circle"></i>
                        Atendimento
                    </a>

                </div>

            </div>

        </div>

    </div>

    <script>

        document.addEventListener('DOMContentLoaded', function () {

            function getCookie(name) {

                let cookieValue = null;

                if (document.cookie && document.cookie !== '') {

                    const cookies = document.cookie.split(';');

                    for (let i = 0; i < cookies.length; i++) {

                        const cookie = cookies[i].trim();

                        if (
                            cookie.substring(0, name.length + 1) ===
                            (name + '=')
                        ) {

                            cookieValue = decodeURIComponent(
                                cookie.substring(name.length + 1)
                            );

                            break;

                        }

                    }

                }

                return cookieValue;

            }

            const calendarEl = document.getElementById('calendar');

            const calendar = new FullCalendar.Calendar(calendarEl, {

                locale: 'pt-br',

                initialView: 'dayGridMonth',

                editable: true,

                events: '/agenda/eventos/',

                headerToolbar: {

                    left: 'prev,next today',

                    center: 'title',

                    right: 'dayGridMonth,timeGridWeek,timeGridDay'

                },

                buttonText: {

                    today: 'Hoje',

                    month: 'Mês',

                    week: 'Semana',

                    day: 'Dia'

                },

                eventDidMount: function (info) {

                    info.el.title =

                        'Paciente: ' +
                        info.event.extendedProps.paciente +

                        '\nStatus: ' +
                        info.event.extendedProps.status +

                        '\nProcedimento: ' +
                        info.event.extendedProps.procedimento +

                        '\nProfissional: ' +
                        info.event.extendedProps.profissional;

                },

                eventClick: function (info) {

                    info.jsEvent.preventDefault();

                    document.getElementById(
                        'modalPaciente'
                    ).innerText =
                        info.event.extendedProps.paciente;

                    const statusEl = document.getElementById(
                        'modalStatus'
                    );

                    statusEl.innerText =
                        info.event.extendedProps.status;

                    statusEl.className =
                        'badge fs-6';

                    if (
                        info.event.extendedProps.status ===
                        'Confirmado'
                    ) {

                        statusEl.classList.add(
                            'bg-success'
                        );

                    } else if (

                        info.event.extendedProps.status ===
                        'Em Atendimento'

                    ) {

                        statusEl.classList.add(
                            'bg-warning'
                        );

                    } else if (

                        info.event.extendedProps.status ===
                        'Finalizado'

                    ) {

                        statusEl.classList.add(
                            'bg-secondary'
                        );

                    } else {

                        statusEl.classList.add(
                            'bg-primary'
                        );

                    }

                    document.getElementById(
                        'modalProcedimento'
                    ).innerText =
                        info.event.extendedProps.procedimento;

                    document.getElementById(
                        'modalProfissional'
                    ).innerText =
                        info.event.extendedProps.profissional;

                    document.getElementById(
                        'btnPerfil'
                    ).href =
                        info.event.extendedProps.perfil_url;

                    document.getElementById(
                        'btnEditar'
                    ).href =
                        info.event.extendedProps.editar_url;

                    document.getElementById(
                        'btnAtendimento'
                    ).href =
                        info.event.extendedProps.iniciar_url;

                    const modal = new bootstrap.Modal(

                        document.getElementById(
                            'eventoModal'
                        )

                    );

                    modal.show();

                },

                eventDrop: function (info) {

                    fetch('/agenda/mover-agendamento/', {

                        method: 'POST',

                        headers: {

                            'Content-Type': 'application/json',

                            'X-CSRFToken': getCookie('csrftoken')

                        },

                        body: JSON.stringify({

                            agendamento_id: info.event.id,

                            nova_data: info.event.startStr

                        })

                    })

                        .then(response => response.json())

                        .then(data => {

                            if (!data.sucesso) {

                                alert('Erro ao mover agendamento');

                                info.revert();

                            }

                        });

                }

            });

            calendar.render();

        });

    </script>

    {% endblock %}
